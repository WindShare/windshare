# CI parity with the local validation contract (docs/.orchestration/work-plan.md §10).
# Every job mirrors a local gate command; the exact command-to-job mapping is
# recorded in docs/.orchestration/E1.md. Both Go modules are validated
# independently (`./...` does not cross the nested core/ module boundary), each
# with vet, build, race tests, and a >=70% per-module coverage gate. Ubuntu jobs
# natively provide the GOOS=linux compile/type-check path of §10.2 and all
# real-socket coverage; the windows-network job runs GOOS=windows vet plus both
# modules' race tests. OS-network test cases are gated at shared constructors
# (internal/testnetwork): open on Linux, skip on Windows outside the local D5
# runner, so no Windows job can hang or touch the firewall. Firewall governance
# is local-dev tooling by owner decision (2026-07-13) and does not run in CI.
name: CI

on:
  push:
  pull_request:

env:
  COVERAGE_THRESHOLD: "70"

jobs:
  hygiene:
    name: Hygiene (gofmt, whitespace, gopls)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
      - name: gofmt over tracked Go files
        run: |
          unformatted="$(git ls-files -z -- '*.go' | xargs -0 gofmt -l)"
          if [ -n "$unformatted" ]; then
            echo "files need gofmt:" >&2
            echo "$unformatted" >&2
            exit 1
          fi
      # Local §10.1 runs `git diff --check` against the dirty worktree; on a
      # clean checkout the equivalent is diffing the committed tree against the
      # empty tree so every tracked file is inspected.
      - name: whitespace errors over the committed tree
        run: git diff --check "$(git hash-object -t tree /dev/null)"
      - name: gopls check (severity=hint, tracked files)
        run: |
          go install golang.org/x/tools/gopls@v0.22.0
          gopls_bin="$(go env GOPATH)/bin/gopls"
          set -o pipefail
          git ls-files -z -- '*.go' | xargs -0 "$gopls_bin" check -severity=hint | tee gopls-diagnostics.txt
          if [ -s gopls-diagnostics.txt ]; then
            echo "gopls reported diagnostics" >&2
            exit 1
          fi

  sloc:
    name: SLOC guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: sloc-guard check
        # Tracks the latest sloc-guard release so new gate features (e.g. rule
        # additions the config relies on) apply without a CI bump.
        uses: doraemonkeys/sloc-guard/.github/action@master

  go-root:
    name: Go root module (vet, build, race, coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test -race
        run: go test -race -count=1 ./...
      - name: go test with coverage
        run: go test -count=1 ./... -covermode=atomic -coverprofile=cover.out
      - name: coverage gate (>=70% per module)
        run: bash .github/scripts/coverage-gate.sh cover.out "$COVERAGE_THRESHOLD"

  go-core:
    name: Go core module (vet, build, race, coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test -race
        run: go test -race -count=1 ./...
      - name: go test with coverage
        run: go test -count=1 ./... -covermode=atomic -coverprofile=cover.out
      - name: coverage gate (>=70% per module)
        run: bash ../.github/scripts/coverage-gate.sh cover.out "$COVERAGE_THRESHOLD"

  golden-vectors:
    name: Golden-vector idempotence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
      # Mirrors §10.3: regenerate every vector family twice; the regenerations
      # must be byte-identical and must match the committed files exactly.
      - name: regenerate twice and compare hashes
        run: |
          go -C core test -count=1 ./share -update
          go test -count=1 ./relay/protocol -update
          sha256sum testvectors/*.json | sort > "$RUNNER_TEMP/vectors-first.sha256"
          go -C core test -count=1 ./share -update
          go test -count=1 ./relay/protocol -update
          sha256sum testvectors/*.json | sort > "$RUNNER_TEMP/vectors-second.sha256"
          diff "$RUNNER_TEMP/vectors-first.sha256" "$RUNNER_TEMP/vectors-second.sha256"
      - name: committed vectors match regeneration
        run: |
          status="$(git -c core.quotepath=false status --short -- testvectors)"
          if [ -n "$status" ]; then
            echo "regenerated vectors differ from committed testvectors/:" >&2
            echo "$status" >&2
            exit 1
          fi

  gowork-off-core:
    name: GOWORK=off core build (release invariant, hard gate)
    runs-on: ubuntu-latest
    env:
      GOWORK: "off"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
      # Hard gate: the core module must always build without the workspace. It
      # runs as its own job so the expected root G-EXT failure can never skip
      # or soften this validation.
      - name: core module GOWORK=off build
        run: go build ./...
        working-directory: core

  gowork-off-root:
    name: GOWORK=off root build
    runs-on: ubuntu-latest
    env:
      GOWORK: "off"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
      # G-EXT resolved 2026-07-13: core/v0.1.1 is published and the root
      # module requires it by version, so the two-module release invariant
      # (root builds without the workspace, no replace) is a hard gate.
      - name: root module GOWORK=off build
        run: go build ./...

  web:
    name: Web (frozen install, lint, typecheck, build, vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      # pnpm only (project constraint); the version comes from the
      # packageManager field in web/package.json.
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: web/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: lint
        run: pnpm lint
      - name: forced typecheck
        run: pnpm exec tsc -b --force
      - name: build
        run: pnpm build
      - name: vitest (consumes all golden-vector families)
        run: pnpm test

  web-playwright:
    name: Web Playwright (M1b + M1c real browser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The Playwright harness builds the windshare/wsrelay/hostile-sender
      # child binaries itself via `go build` (web/e2e/fixtures/process.ts), so
      # this job needs the Go toolchain as well.
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: web/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: install (frozen lockfile)
        run: pnpm -C web install --frozen-lockfile
      - name: install Chromium
        run: pnpm -C web exec playwright install --with-deps chromium
      # web/playwright.config.ts hard-rejects a direct invocation only on
      # Windows, where the sanctioned path is the frozen D5 runner in
      # BrowserTests mode. On Linux the direct command below is the sanctioned
      # §10.4 invocation, so CI runs the full M1b+M1c scenario suite here
      # against real wsrelay/windshare/Chromium.
      # Playwright traces/screenshots are deliberately not uploaded as
      # artifacts: failure traces of capability-driving specs can contain the
      # capability URL including the key fragment.
      - name: Playwright M1b+M1c suite
        run: pnpm -C web exec playwright test
      # The D1/D2 WebRTC interop specs live outside the main scenario gate and
      # run only through this dedicated config (forward-routed by R-C-e2e.md).
      # The config starts its own Vite server and the Go Pion helper server.
      - name: Playwright D1/D2 WebRTC interop suite
        run: pnpm -C web exec playwright test --config test/transport/webrtc/browser.playwright.config.ts

  windows-tests:
    name: Windows tests (vet + race, OS-network cases gated)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
      # Windows-tagged files are otherwise only compiled, never vet-analyzed:
      # ubuntu jobs vet GOOS=linux and the test steps below do not run vet
      # (E1-review.md finding LOW-1).
      - name: go vet (root, GOOS=windows)
        run: go vet ./...
      - name: go vet (core, GOOS=windows)
        run: go vet ./...
        working-directory: core
      # OS-network cases self-gate at the shared socket/process constructors
      # (internal\testnetwork): skip on Windows outside the local D5 runner, so
      # these sweeps cannot hang or touch the firewall. The D5 fixed-path
      # runner and its firewall-forensics suites are local-dev tooling by
      # owner decision (2026-07-13) and intentionally do not run in CI;
      # real-socket coverage lives in the ubuntu jobs.
      - name: root Windows race tests (OS-network cases gated)
        run: go test -race -count=1 ./...
      - name: core Windows race tests
        run: go -C core test -race -count=1 ./...
